<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" fill="none">
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="80" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8f0"/>
      <stop offset="1" stop-color="#ffe8f0"/>
    </linearGradient>
    <linearGradient id="dress" x1="24" y1="50" x2="64" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6b8a"/>
      <stop offset="1" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="bow" x1="58" y1="16" x2="74" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd54f"/>
      <stop offset="1" stop-color="#ff9800"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="44" cy="44" r="42" fill="url(#bg)" stroke="#ffc1d6" stroke-width="2"/>
  <!-- ponytail -->
  <ellipse cx="62" cy="30" rx="12" ry="16" fill="#5d3a1a" transform="rotate(18 62 30)"/>
  <ellipse cx="64" cy="42" rx="8" ry="11" fill="#6d4420" transform="rotate(12 64 42)"/>
  <!-- hair -->
  <path d="M22 38c2-16 14-24 28-22 12 2 20 10 22 22 2 10-2 18-8 22-2-12-10-18-22-18s-20 6-24 18c-4-4-6-12-4-20 2-8 8-14 16-18z" fill="#5d3a1a"/>
  <path d="M24 32c6-10 16-14 26-12 8 2 14 8 16 16" stroke="#4a2e15" stroke-width="2.5" stroke-linecap="round"/>
  <!-- face -->
  <ellipse cx="44" cy="40" rx="20" ry="19" fill="#ffe8d6"/>
  <!-- bangs -->
  <path d="M26 34c4-8 12-12 20-11 6 1 10 4 12 8-4-2-8-3-12-3-8 0-14 3-18 8-1-1-2-2-2-2z" fill="#5d3a1a"/>
  <!-- eyes (Peko style dots) -->
  <ellipse cx="36" cy="40" rx="2.8" ry="3.5" fill="#2d1b0e"/>
  <ellipse cx="52" cy="40" rx="2.8" ry="3.5" fill="#2d1b0e"/>
  <circle cx="37" cy="38.8" r="1" fill="#fff"/>
  <circle cx="53" cy="38.8" r="1" fill="#fff"/>
  <!-- rosy cheeks -->
  <circle cx="29" cy="46" r="5.5" fill="#ff8a80" opacity="0.75"/>
  <circle cx="59" cy="46" r="5.5" fill="#ff8a80" opacity="0.75"/>
  <!-- smile + tongue hint -->
  <path d="M38 48 Q44 54 50 48" stroke="#d84315" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="44" cy="51" rx="4" ry="2.5" fill="#ff8a80"/>
  <!-- collar -->
  <path d="M30 56h28c-4 6-8 8-14 8s-10-2-14-8z" fill="#fff"/>
  <!-- colorful dress -->
  <path d="M22 58c6 18 14 24 22 24s16-6 22-24c-4 14-12 20-22 20s-18-6-22-20z" fill="url(#dress)"/>
  <!-- polka dots on dress -->
  <circle cx="34" cy="66" r="2.5" fill="#fff" opacity="0.85"/>
  <circle cx="44" cy="72" r="2.5" fill="#fff" opacity="0.85"/>
  <circle cx="54" cy="66" r="2.5" fill="#fff" opacity="0.85"/>
  <!-- hair bow -->
  <ellipse cx="66" cy="24" rx="7" ry="5" fill="url(#bow)" transform="rotate(-20 66 24)"/>
  <circle cx="66" cy="24" r="2.5" fill="#ff6f00"/>
  <!-- 婷 lower area -->
  <text x="44" y="78" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="17" font-weight="800" fill="#ffffff" stroke="#c2185b" stroke-width="0.6">婷</text>
</svg>
